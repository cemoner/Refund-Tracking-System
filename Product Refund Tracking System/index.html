<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refund Tracking Page</title>
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spartan:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body id="body-index">
    <div id="login">
      <form>
        <div id="user-type">
          <input type="radio" id="employer" name="user-type" value="employer" />
          <label for="Employer">Employer</label>
          <input type="radio" id="employee" name="user-type" value="employee" />
          <label for="Employee">Employee</label>
        </div>
        <div id="credentials">
          <label for="username">Username</label><br />
          <input type="text" id="username" name="username" /><br />
          <label for="pwd">Password</label><br />
          <input type="password" id="pwd" name="pwd" /><br />
          <input type="submit" value="Submit" id="submit" />
        </div>
      </form>
    </div>
  </body>
</html>
